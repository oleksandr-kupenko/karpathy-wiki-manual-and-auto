<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 480" width="1060" height="480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="1060" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="530" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1e40af">Karpathy Wiki — Pipeline</text>

  <!-- SOURCES label -->
  <text x="180" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="2">SOURCES</text>

  <!-- raw/ box -->
  <rect x="80" y="115" width="200" height="65" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="180" y="140" text-anchor="middle" font-size="18" font-weight="600" fill="#c2410c">raw/</text>
  <text x="180" y="158" text-anchor="middle" font-size="11" fill="#78716c">Manual: devlog, articles</text>
  <text x="180" y="196" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Immutable — never deleted</text>

  <!-- daily/ box -->
  <rect x="80" y="240" width="200" height="65" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="180" y="265" text-anchor="middle" font-size="18" font-weight="600" fill="#c2410c">daily/</text>
  <text x="180" y="283" text-anchor="middle" font-size="11" fill="#78716c">Auto: session summaries</text>
  <text x="180" y="321" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Ephemeral — deleted after compile</text>

  <!-- COMPILE box (center) -->
  <rect x="410" y="170" width="220" height="100" rx="10" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="520" y="210" text-anchor="middle" font-size="20" font-weight="700" fill="#6d28d9">Compile</text>
  <text x="520" y="232" text-anchor="middle" font-size="13" fill="#7c3aed">LLM or Manual</text>
  <text x="520" y="250" text-anchor="middle" font-size="11" fill="#8b5cf6">(assistant reads &amp; creates .md)</text>

  <!-- WIKI OUTPUT label -->
  <rect x="745" y="80" width="210" height="4" rx="2" fill="#a7f3d0"/>
  <text x="850" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="2">WIKI OUTPUT</text>

  <!-- concepts/ box -->
  <rect x="745" y="115" width="210" height="65" rx="8" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="850" y="140" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">concepts/</text>
  <text x="850" y="158" text-anchor="middle" font-size="11" fill="#065f46">Patterns, bugs, features, how-tos</text>

  <!-- connections/ box -->
  <rect x="745" y="240" width="210" height="65" rx="8" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="850" y="265" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">connections/</text>
  <text x="850" y="283" text-anchor="middle" font-size="11" fill="#065f46">Workflows, cross-cutting rationale</text>

  <!-- "Only 2 folders" note -->
  <text x="850" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Only 2 folders. Simple.</text>

  <!-- index.md / log.md -->
  <text x="520" y="360" text-anchor="middle" font-size="15" font-weight="600" fill="#3b82f6">index.md · log.md</text>
  <text x="520" y="380" text-anchor="middle" font-size="11" fill="#94a3b8">Catalog · Audit trail (auto-updated)</text>

  <!-- Session Start (top) -->
  <rect x="420" y="42" width="200" height="40" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="520" y="67" text-anchor="middle" font-size="13" fill="#1e40af">Session Start → reads index.md</text>

  <!-- Arrows: sources → compile -->
  <defs>
    <marker id="ah-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c2410c"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#047857"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- raw → compile -->
  <line x1="280" y1="148" x2="408" y2="195" stroke="#c2410c" stroke-width="2" marker-end="url(#ah-orange)"/>
  <!-- daily → compile -->
  <line x1="280" y1="273" x2="408" y2="240" stroke="#c2410c" stroke-width="2" marker-end="url(#ah-orange)"/>
  <!-- compile → concepts -->
  <line x1="632" y1="200" x2="743" y2="155" stroke="#047857" stroke-width="2" marker-end="url(#ah-green)"/>
  <!-- compile → connections -->
  <line x1="632" y1="235" x2="743" y2="268" stroke="#047857" stroke-width="2" marker-end="url(#ah-green)"/>
  <!-- compile → index.md -->
  <line x1="520" y1="272" x2="520" y2="348" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-blue)"/>

  <!-- Folder structure (bottom) -->
  <rect x="60" y="410" width="940" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="530" y="434" text-anchor="middle" font-size="12" fill="#64748b" font-family="monospace">
    ~/WIKI/project-name/
  </text>
  <text x="530" y="454" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="monospace">
    ├── compiler/  (this repo: scripts, hooks)  ·  └── obsidian/  (the vault: index, raw, daily, wiki)
  </text>
</svg>
