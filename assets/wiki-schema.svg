<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <style>
    text { font-family: "DejaVu Sans", "Segoe UI", sans-serif; fill: #ddd; }
    .mono { font-family: "DejaVu Sans Mono", "Courier New", monospace; }
    .title { font-size: 18px; font-weight: bold; fill: #ddd; }
    .label { font-size: 14px; }
    .dim { font-size: 12px; fill: #999; }
    .blue { fill: #64b4ff; }
    .green { fill: #50d280; }
    .purple { fill: #b480ff; }
    .conn-green { fill: #50c878; }
  </style>
  <rect width="900" height="520" fill="#121212" rx="0"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" class="title">Karpathy Wiki — Architecture</text>

  <!-- raw/ box -->
  <rect x="50" y="80" width="160" height="100" rx="10" fill="#1e3c5a" stroke="#4682b4" stroke-width="2"/>
  <text x="130" y="106" text-anchor="middle" class="mono blue" font-size="14">raw/</text>
  <text x="130" y="126" text-anchor="middle" class="dim">immutable</text>
  <text x="130" y="142" text-anchor="middle" class="dim">devlog, articles,</text>
  <text x="130" y="158" text-anchor="middle" class="dim">transcripts</text>

  <!-- daily/ box -->
  <rect x="50" y="210" width="160" height="100" rx="10" fill="#1e3c5a" stroke="#4682b4" stroke-width="2"/>
  <text x="130" y="236" text-anchor="middle" class="mono blue" font-size="14">daily/</text>
  <text x="130" y="256" text-anchor="middle" class="dim">ephemeral</text>
  <text x="130" y="272" text-anchor="middle" class="dim">session summaries</text>
  <text x="130" y="288" text-anchor="middle" class="dim">from hooks</text>

  <!-- Arrows: sources → compile -->
  <line x1="210" y1="130" x2="288" y2="174" stroke="#999" stroke-width="2"/>
  <polygon points="288,174 276,166 280,178" fill="#999"/>
  <line x1="210" y1="260" x2="288" y2="196" stroke="#999" stroke-width="2"/>
  <polygon points="288,196 276,188 280,200" fill="#999"/>

  <!-- compile.py box -->
  <rect x="290" y="120" width="170" height="130" rx="12" fill="#32285a" stroke="#8c64d4" stroke-width="2"/>
  <text x="375" y="150" text-anchor="middle" class="mono purple" font-size="14">compile.py</text>
  <text x="375" y="171" text-anchor="middle" class="dim">Claude Agent SDK</text>
  <text x="375" y="189" text-anchor="middle" class="dim">reads sources,</text>
  <text x="375" y="205" text-anchor="middle" class="dim">creates / updates</text>
  <text x="375" y="221" text-anchor="middle" class="dim">wiki pages</text>

  <!-- Arrow: compile → wiki -->
  <line x1="460" y1="185" x2="538" y2="185" stroke="#999" stroke-width="2"/>
  <polygon points="538,185 526,179 526,191" fill="#999"/>

  <!-- wiki/ outer box -->
  <rect x="540" y="60" width="310" height="320" rx="14" fill="#14322318" stroke="#32a050" stroke-width="2"/>
  <text x="695" y="90" text-anchor="middle" class="mono green" font-size="15">wiki/</text>

  <!-- concepts/ -->
  <rect x="558" y="105" width="274" height="72" rx="8" fill="#193c28" stroke="#50c878" stroke-width="1"/>
  <text x="695" y="127" text-anchor="middle" class="mono conn-green" font-size="13">concepts/</text>
  <text x="695" y="147" text-anchor="middle" class="dim">facts, patterns, how things work</text>
  <text x="695" y="163" text-anchor="middle" class="dim">bugs · features · architecture · ops</text>

  <!-- decisions/ -->
  <rect x="558" y="189" width="274" height="72" rx="8" fill="#193c28" stroke="#50c878" stroke-width="1"/>
  <text x="695" y="211" text-anchor="middle" class="mono conn-green" font-size="13">decisions/</text>
  <text x="695" y="231" text-anchor="middle" class="dim">why X over Y</text>
  <text x="695" y="247" text-anchor="middle" class="dim">trade-offs, rationale</text>

  <!-- connections/ -->
  <rect x="558" y="273" width="274" height="72" rx="8" fill="#193c28" stroke="#50c878" stroke-width="1"/>
  <text x="695" y="295" text-anchor="middle" class="mono conn-green" font-size="13">connections/</text>
  <text x="695" y="315" text-anchor="middle" class="dim">non-obvious links</text>
  <text x="695" y="331" text-anchor="middle" class="dim">between 2+ concepts</text>

  <!-- Hooks section -->
  <rect x="50" y="390" width="740" height="105" rx="12" fill="#1e1e28" stroke="#505064" stroke-width="1"/>
  <text x="420" y="415" text-anchor="middle" class="label" font-size="14">Hooks (Claude Code / OpenCode / Cursor)</text>

  <!-- hook dividers -->
  <line x1="235" y1="425" x2="235" y2="486" stroke="#404058" stroke-width="1"/>
  <line x1="420" y1="425" x2="420" y2="486" stroke="#404058" stroke-width="1"/>
  <line x1="605" y1="425" x2="605" y2="486" stroke="#404058" stroke-width="1"/>

  <text x="142" y="445" text-anchor="middle" class="mono blue" font-size="12">session-start</text>
  <text x="142" y="462" text-anchor="middle" class="dim">inject index.md</text>
  <text x="142" y="477" text-anchor="middle" class="dim">into context</text>

  <text x="327" y="445" text-anchor="middle" class="mono blue" font-size="12">session-end</text>
  <text x="327" y="462" text-anchor="middle" class="dim">extract → flush.py</text>
  <text x="327" y="477" text-anchor="middle" class="dim">→ daily/</text>

  <text x="512" y="445" text-anchor="middle" class="mono blue" font-size="12">pre-compact</text>
  <text x="512" y="462" text-anchor="middle" class="dim">save context</text>
  <text x="512" y="477" text-anchor="middle" class="dim">before compaction</text>

  <text x="697" y="445" text-anchor="middle" class="mono blue" font-size="12">flush.py</text>
  <text x="697" y="462" text-anchor="middle" class="dim">DeepSeek or Claude</text>
  <text x="697" y="477" text-anchor="middle" class="dim">→ daily/YYYY-MM-DD.md</text>

  <!-- small upward arrow from hooks to daily -->
  <line x1="230" y1="390" x2="130" y2="310" stroke="#508050" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="130,310 124,322 136,320" fill="#508050"/>
</svg>