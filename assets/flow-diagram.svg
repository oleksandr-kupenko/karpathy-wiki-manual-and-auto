<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#fafaf9"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Karpaty Memory — Data Flow</text>

  <!-- ═══════════ LEFT COLUMN: Coding Session ═══════════ -->

  <!-- Session box -->
  <rect x="30" y="60" width="180" height="80" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Coding Session</text>
  <text x="120" y="112" text-anchor="middle" font-size="11" fill="#a16207">Claude Code / OpenCode</text>

  <!-- Session start hook -->
  <rect x="30" y="175" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">session-start.py</text>
  <text x="120" y="214" text-anchor="middle" font-size="10" fill="#15803d">inject wiki into context</text>

  <!-- Session end / pre-compact hooks -->
  <rect x="30" y="265" width="180" height="50" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">session-end / pre-compact</text>
  <text x="120" y="304" text-anchor="middle" font-size="10" fill="#c2410c">extract conversation</text>

  <!-- Arrows: session → hooks -->
  <line x1="90" y1="140" x2="90" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="140" x2="150" y2="265" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="62" y="162" font-size="9" fill="#94a3b8" font-style="italic">start</text>
  <text x="156" y="210" font-size="9" fill="#94a3b8" font-style="italic">end / compact</text>

  <!-- ═══════════ MIDDLE COLUMN: flush.py ═══════════ -->

  <!-- flush.py box -->
  <rect x="290" y="240" width="180" height="100" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">flush.py</text>
  <text x="380" y="290" text-anchor="middle" font-size="10" fill="#3b82f6">summarize session</text>
  <!-- Provider badges -->
  <rect x="307" y="302" width="60" height="20" rx="4" fill="#dbeafe"/>
  <text x="337" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">DeepSeek</text>
  <text x="376" y="316" font-size="10" fill="#94a3b8">/</text>
  <rect x="386" y="302" width="55" height="20" rx="4" fill="#f3e8ff"/>
  <text x="413" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">Claude</text>

  <!-- Arrow: session-end → flush.py -->
  <line x1="210" y1="290" x2="290" y2="290" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="283" font-size="9" fill="#94a3b8" font-style="italic">spawns</text>

  <!-- ═══════════ daily/ ═══════════ -->

  <rect x="545" y="255" width="140" height="70" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="615" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">daily/</text>
  <text x="615" y="300" text-anchor="middle" font-size="10" fill="#dc2626">session summaries</text>
  <text x="615" y="316" text-anchor="middle" font-size="9" fill="#ef4444" font-style="italic">ephemeral</text>

  <!-- Arrow: flush.py → daily/ -->
  <line x1="470" y1="290" x2="545" y2="290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ RIGHT COLUMN: compile.py ═══════════ -->

  <rect x="545" y="385" width="180" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="635" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">compile.py</text>
  <text x="635" y="432" text-anchor="middle" font-size="10" fill="#15803d">Claude Agent SDK</text>
  <text x="635" y="446" text-anchor="middle" font-size="9" fill="#22c55e" font-style="italic">auto after 18:00 or manual</text>

  <!-- Arrow: daily/ → compile.py -->
  <line x1="615" y1="325" x2="615" y2="385" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ raw/ ═══════════ -->

  <rect x="330" y="385" width="140" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">raw/</text>
  <text x="400" y="430" text-anchor="middle" font-size="10" fill="#64748b">devlog, articles</text>
  <text x="400" y="446" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">immutable</text>

  <!-- Arrow: raw/ → compile.py -->
  <line x1="470" y1="420" x2="545" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ BOTTOM: wiki/ ═══════════ -->

  <rect x="130" y="385" width="160" height="70" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">wiki/</text>
  <text x="210" y="430" text-anchor="middle" font-size="10" fill="#7c3aed">7 categorized folders</text>
  <text x="210" y="446" text-anchor="middle" font-size="9" fill="#8b5cf6" font-style="italic">index.md + log.md</text>

  <!-- Arrow: compile.py → wiki/ -->
  <line x1="545" y1="435" x2="290" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ═══════════ Loop: wiki/ → session-start ═══════════ -->

  <path d="M 130,420 Q 10,420 10,290 Q 10,195 30,200" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="6 3"/>
  <text x="16" y="340" font-size="9" fill="#3b82f6" font-weight="500" writing-mode="tb">reads index.md</text>

  <!-- ═══════════ Auto-compile arrow: flush.py → compile.py ═══════════ -->
  <path d="M 380,340 Q 380,365 500,365 Q 545,365 570,385" stroke="#94a3b8" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
  <text x="430" y="360" font-size="8" fill="#94a3b8" font-style="italic">after 18:00</text>

  <!-- ═══════════ Legend ═══════════ -->
  <rect x="660" y="60" width="220" height="120" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="770" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Provider Fallback</text>
  <line x1="680" y1="90" x2="860" y2="90" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="110" font-size="10" fill="#334155">1. flush-config → "claude"</text>
  <text x="680" y="128" font-size="10" fill="#334155">2. DEEPSEEK_API_KEY set → DeepSeek</text>
  <text x="680" y="146" font-size="10" fill="#334155">3. No key → Claude Agent SDK</text>
  <text x="680" y="166" font-size="10" fill="#94a3b8" font-style="italic">(uses Claude Code subscription)</text>

  <!-- ═══════════ Source type labels ═══════════ -->
  <rect x="660" y="195" width="220" height="90" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="770" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Source Types</text>
  <line x1="680" y1="225" x2="860" y2="225" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="680" y="235" width="8" height="8" rx="2" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="695" y="243" font-size="10" fill="#334155">raw/ — immutable, manual</text>
  <rect x="680" y="255" width="8" height="8" rx="2" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="695" y="263" font-size="10" fill="#334155">daily/ — ephemeral, auto</text>
  <rect x="680" y="275" width="8" height="8" rx="2" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="695" y="283" font-size="10" fill="#334155">wiki/ — LLM-generated</text>

  <!-- ═══════════ Cleanup note ═══════════ -->
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#94a3b8">daily/ files are auto-deleted after successful compilation · raw/ files are never modified</text>
</svg>
